<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LoomLearn Register</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,Helvetica,sans-serif;
}

body{
    background:linear-gradient(to right,#dff8ff,#eefbff);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    width:950px;
    background:#fff;
    border-radius:15px;
    overflow:hidden;
    box-shadow:0 10px 25px rgba(0,0,0,.2);
    display:flex;
}

.left{
    width:40%;
    background:#eaf8ff;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

.left img{
    width:90%;
    max-width:300px;
}

.right{
    width:60%;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:25px;
}

.register-box{
    width:360px;
}

h2{
    text-align:center;
    color:#0a2d62;
    font-size:32px;
    margin-bottom:20px;
}

.input{
    display:flex;
    align-items:center;
    border:1px solid #ddd;
    border-radius:8px;
    margin-bottom:15px;
    overflow:hidden;
}

.input span{
    width:50px;
    text-align:center;
    font-size:20px;
}

.input input,
.input textarea,
.input select{
    width:100%;
    padding:12px;
    border:none;
    outline:none;
    font-size:15px;
}

.input textarea{
    resize:none;
    height:60px;
}

.register{
    width:100%;
    padding:14px;
    border:none;
    border-radius:8px;
    background:#0066ff;
    color:white;
    font-size:18px;
    cursor:pointer;
}

.register:hover{
    background:#004ecc;
}

#error{
    color:red;
    text-align:center;
    margin-bottom:10px;
    display:none;
}

#success{
    color:green;
    text-align:center;
    margin-bottom:10px;
    display:none;
}

.or{
    text-align:center;
    margin:20px 0;
    color:#888;
    position:relative;
}

.or::before{
    content:"";
    position:absolute;
    left:0;
    top:50%;
    width:40%;
    height:1px;
    background:#ccc;
}

.or::after{
    content:"";
    position:absolute;
    right:0;
    top:50%;
    width:40%;
    height:1px;
    background:#ccc;
}

.login-text{
    text-align:center;
}

.login-text a{
    color:#0066ff;
    text-decoration:none;
    font-weight:bold;
}

.login-text a:hover{
    text-decoration:underline;
}

</style>
</head>

<body>

<div class="container">

<div class="left">
    <img src="images/register.jpeg" alt="Register">
</div>

<div class="right">

<div class="register-box">

<h2>REGISTER</h2>

<form id="register-form">

<!-- <div class="input">
<span>🆔</span>
<input type="number" id="id" placeholder="User ID" required>
</div> -->

<div class="input">
<span>👤</span>
<input type="text" id="fullname" placeholder="Full Name" required>
</div>

<div class="input">
<span>📧</span>
<input type="email" id="email" placeholder="Email" required>
</div>

<div class="input">
<span>🔒</span>
<input type="password" id="password" placeholder="Password" required>
</div>

<div class="input">
<span>🏢</span>
<input type="text" id="department" placeholder="Department">
</div>

<div class="input">
<span>📝</span>
<textarea id="bio" placeholder="Bio"></textarea>
</div>

<div class="input">
<span>👥</span>
<select id="role">
<option value="ACADEMIC_ADMIN">ACADEMIC_ADMIN</option>
<option value="MENTOR">MENTOR</option>
<option value="LEARNER" selected>LEARNER</option>
<option value="SUPPORT_AGENT">SUPPORT_AGENT</option>
</select>
</div>

<div id="error"></div>

<div id="success"></div>

<button type="submit" class="register" id="register-btn">
REGISTER
</button>

</form>

<div class="or">OR</div>

<div class="login-text">
Already have an account?
<a href="login.html">Login</a>
</div>

</div>

</div>

</div><script>

const API_BASE = "https://loombackend-1.onrender.com";

document.getElementById("register-form").addEventListener("submit", async function(e){

    e.preventDefault();

    //const id = document.getElementById("id").value;
    const fullname = document.getElementById("fullname").value.trim();
    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value;
    const department = document.getElementById("department").value.trim();
    const bio = document.getElementById("bio").value.trim();
    const role = document.getElementById("role").value;

    const err = document.getElementById("error");
    const success = document.getElementById("success");
    const btn = document.getElementById("register-btn");

    err.style.display = "none";
    success.style.display = "none";

    //!id ||
    if( !fullname || !email || !password){

        err.textContent = "Please fill in all required fields.";
        err.style.display = "block";
        return;
    }

    if(password.length < 6){

        err.textContent = "Password must be at least 6 characters.";
        err.style.display = "block";
        return;
    }

    btn.textContent = "Registering...";
    btn.disabled = true;

    try{

        const res = await fetch(API_BASE + "/api/auth/register",{

            method:"POST",

            headers:{
                "Content-Type":"application/json"
            },

            body:JSON.stringify({

               // id:Number(id),
                fullName:fullname,
                email:email,
                password:password,
                department:department,
                bio:bio,
                role:role

            })

        });

        if(res.ok){

            success.textContent =
            "Registration Successful! Redirecting to Login...";
            success.style.display = "block";

            document.getElementById("register-form").reset();

            setTimeout(function(){

                window.location.href = "login.html";

            },1500);

        }else{

            const data = await res.json().catch(() => ({}));

            err.textContent =
            data.message || "Registration Failed.";

            err.style.display = "block";
        }

    }catch(error){

        err.textContent =
        "Cannot connect to server. Make sure Spring Boot is running.";

        err.style.display = "block";

    }finally{

        btn.textContent = "REGISTER";
        btn.disabled = false;

    }

});

</script>

</body>
</html>
