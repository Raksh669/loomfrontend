<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LoomLearn Login</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,Helvetica,sans-serif;
}

body{
    background:linear-gradient(to right,#dff8ff,#eefbff);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    width:850px;
    height:480px;
    background:#fff;
    border-radius:15px;
    overflow:hidden;
    box-shadow:0 10px 25px rgba(0,0,0,.2);
    display:flex;
}

.left{
    width:45%;
    background:#eaf8ff;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

.left img{
    width:90%;
    max-width:280px;
    height:auto;
}

.right{
    width:55%;
    display:flex;
    justify-content:center;
    align-items:center;
}

.login-box{
    width:320px;
}

h2{
    text-align:center;
    color:#0a2d62;
    font-size:32px;
    margin-bottom:30px;
}

.input{
    display:flex;
    align-items:center;
    border:1px solid #ddd;
    border-radius:8px;
    margin-bottom:18px;
    overflow:hidden;
}

.input span{
    width:50px;
    text-align:center;
    font-size:22px;
}

.input input{
    width:100%;
    padding:14px;
    border:none;
    outline:none;
    font-size:16px;
}

.login{
    width:100%;
    padding:14px;
    border:none;
    border-radius:8px;
    background:#0066ff;
    color:white;
    font-size:18px;
    cursor:pointer;
}

.login:hover{
    background:#004ecc;
}

#error{
    color:red;
    text-align:center;
    margin-bottom:15px;
    display:none;
}

.or{
    text-align:center;
    margin:20px 0;
    color:#888;
    position:relative;
}

.or::before{
    content:"";
    position:absolute;
    left:0;
    top:50%;
    width:40%;
    height:1px;
    background:#ccc;
}

.or::after{
    content:"";
    position:absolute;
    right:0;
    top:50%;
    width:40%;
    height:1px;
    background:#ccc;
}

.register-text{
    text-align:center;
}

.register-text a{
    color:#0066ff;
    text-decoration:none;
    font-weight:bold;
}

.register-text a:hover{
    text-decoration:underline;
}

</style>
</head>

<body>

<div class="container">

    <div class="left">
        <img src="images/login.jpeg" alt="Login Image">
    </div>

    <div class="right">

        <div class="login-box">

            <h2>LOGIN</h2>

            <form id="login-form">

                <div class="input">
                    <span>📧</span>
                    <input
                        type="email"
                        id="login-email"
                        placeholder="Email"
                        required>
                </div>

                <div class="input">
                    <span>🔒</span>
                    <input
                        type="password"
                        id="login-password"
                        placeholder="Password"
                        required>
                </div>

                <div id="error"></div>

                <button
                    type="submit"
                    class="login"
                    id="login-btn">
                    LOGIN
                </button>

            </form>

            <div class="or">OR</div>

            <div class="register-text">
                Don't have an account?
                <a href="register.html">Register</a>
            </div>

        </div>

    </div>

</div>

<script>

const API_BASE = "https://loombackend-1.onrender.com";
/*if (localStorage.getItem("token")) {
    window.location.href = "dashboard.html";
}*/

document.getElementById("login-form").addEventListener("submit", async function(e){

    e.preventDefault();

    const email = document.getElementById("login-email").value.trim();
    const password = document.getElementById("login-password").value;

    const errDiv = document.getElementById("error");
    const btn = document.getElementById("login-btn");

    errDiv.style.display = "none";

    if(!email || !password){

        errDiv.textContent = "Please enter Email and Password.";
        errDiv.style.display = "block";
        return;
    }

    btn.textContent = "Logging in...";
    btn.disabled = true;

    try{

        const res = await fetch(API_BASE + "/api/auth/login",{

            method:"POST",

            headers:{
                "Content-Type":"application/json"
            },

            body:JSON.stringify({
                email:email,
                password:password
            })

        });

        if(res.ok){

            const data = await res.json();

            localStorage.setItem("token", data.token);
            localStorage.setItem("role", data.role);

            alert("Login Successful");
            window.location.href = "dashboard.html";
            /*if(data.role === "ACADEMIC_ADMIN"){
                window.location.href = "admin.html";
            }
            else if(data.role === "MENTOR"){
                window.location.href = "mentor.html";
            }
            else if(data.role === "SUPPORT_AGENT"){
                window.location.href = "support.html";
            }
            else{
                window.location.href = "learner.html";
            }*/

        }else{

            const data = await res.json().catch(() => ({}));

            errDiv.textContent =
                data.message || "Invalid Email or Password.";

            errDiv.style.display = "block";
        }

    }catch(error){

        errDiv.textContent =
            "Cannot connect to server. Make sure Spring Boot is running.";

        errDiv.style.display = "block";
    }

    finally{

        btn.textContent = "LOGIN";
        btn.disabled = false;
    }

});

</script>

</body>
</html>
