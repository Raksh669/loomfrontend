<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Subject Operations | LoomLearn</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:linear-gradient(to right,#dff8ff,#eefbff);
    min-height:100vh;
}

/* ================= NAVBAR ================= */

.navbar{
    height:72px;
    background:#0d47a1;
    color:white;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:0 30px;
    box-shadow:0 3px 10px rgba(0,0,0,.2);
}

.logo{
    display:flex;
    align-items:center;
    gap:12px;
}

.logo h2{
    font-size:36px;
    font-weight:bold;
}

.user-section{
    display:flex;
    align-items:center;
    gap:15px;
}

#welcomeText{
    font-size:18px;
    font-weight:bold;
}

.logout-btn{
    border:none;
    background:#ff5c3a;
    color:white;
    padding:10px 22px;
    border-radius:8px;
    cursor:pointer;
    font-size:16px;
    font-weight:bold;
    transition:.3s;
}

.logout-btn:hover{
    background:#e64a19;
}

/* ================= MAIN ================= */

.main{
    width:92%;
    margin:auto;
    text-align:center;
    padding-top:60px;
}

.icon-circle{
    width:95px;
    height:95px;
    margin:auto;
    border-radius:50%;
    background:#dbeeff;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:46px;
    color:#0d47a1;
}

.main h1{
    color:#0d47a1;
    font-size:50px;
    margin-top:18px;
}

.line{
    width:110px;
    height:5px;
    background:#4f8df7;
    border-radius:20px;
    margin:18px auto 45px;
}

/* ================= BUTTONS ================= */

.button-grid{
    display:flex;
    justify-content:center;
    flex-wrap:wrap;
    gap:22px;
}

.op-btn{
    width:210px;
    height:115px;
    border:none;
    border-radius:14px;
    cursor:pointer;
    font-size:22px;
    font-weight:bold;
    box-shadow:0 6px 15px rgba(0,0,0,.15);
    transition:.3s;
}

.op-btn:hover{
    transform:translateY(-5px);
}

.op-btn span{
    display:block;
    margin-top:10px;
    font-size:18px;
}

/* Button Colors */

.btn-add{
    background:#ffd9d9;
}

.btn-getall{
    background:#fff2b8;
}

.btn-get{
    background:#e8ffd0;
}

.btn-update{
    background:#dff0ff;
}

.btn-patch{
    background:#efd8ff;
}

.btn-delete{
    background:#ffe9c9;
}

/* ================= HOME BUTTON ================= */

.home-btn{
    margin-top:40px;
    background:#0d47a1;
    color:white;
    border:none;
    padding:16px 35px;
    border-radius:10px;
    font-size:18px;
    font-weight:bold;
    cursor:pointer;
    box-shadow:0 5px 10px rgba(0,0,0,.2);
}

.home-btn:hover{
    background:#08306b;
}

/* ================= PANELS ================= */

.panel{
    display:none;
    width:85%;
    margin:40px auto;
    background:white;
    padding:25px;
    border-radius:12px;
    box-shadow:0 5px 15px rgba(0,0,0,.15);
}

.panel.active{
    display:block;
}

</style>

</head>

<body>

<!-- ================= NAVBAR ================= -->

<div class="navbar">

<div class="logo">
<h2>📚 Subjects</h2>
</div>

<div class="user-section">

<span id="welcomeText"></span>

<button class="logout-btn" onclick="logout()">
➡ Logout
</button>

</div>

</div>

<!-- ================= MAIN ================= -->

<div class="main">

<div class="icon-circle">
📚
</div>

<h1>Subject Operations</h1>

<div class="line"></div>

<div class="button-grid">

<button class="op-btn btn-add"
onclick="showPanel('panel-add')">
➕
<span>Add Subject</span>
</button>

<button class="op-btn btn-getall"
onclick="showPanel('panel-getall')">
📚
<span>Get All Subjects</span>
</button>

<button class="op-btn btn-get"
onclick="showPanel('panel-get')">
🔎
<span>Get Subject By ID</span>
</button>

<button class="op-btn btn-update"
onclick="showPanel('panel-update')">
✏️
<span>Update Subject</span>
</button>

<button class="op-btn btn-patch"
onclick="showPanel('panel-patch')">
📝
<span>Patch Subject</span>
</button>

<button class="op-btn btn-delete"
onclick="showPanel('panel-delete')">
🚮
<span>Delete Subject</span>
</button>

</div>

<br><br>

<button class="home-btn"
onclick="window.location.href='dashboard.html'">
🏠 Back to Dashboard
</button>

</div>
<!-- ================= FORM / TABLE STYLES ================= -->

<style>

.form-group{
    margin-bottom:18px;
    text-align:left;
}

.form-group label{
    display:block;
    margin-bottom:8px;
    font-weight:bold;
    color:#0d47a1;
    font-size:17px;
}

.form-group input,
.form-group textarea{

    width:100%;
    padding:12px;
    border:1px solid #cfd8dc;
    border-radius:8px;
    font-size:16px;
    outline:none;
    resize:vertical;

}

.form-group input:focus,
.form-group textarea:focus{

    border-color:#1976d2;

}

.submit-btn{

    background:#0d47a1;
    color:white;
    border:none;
    padding:12px 25px;
    border-radius:8px;
    cursor:pointer;
    font-size:17px;
    font-weight:bold;

}

.submit-btn:hover{

    background:#08306b;

}

.delete-btn{

    background:#e53935;

}

.delete-btn:hover{

    background:#c62828;

}

.response-box{

    display:none;
    margin-top:20px;
    padding:15px;
    background:#f5f5f5;
    border-left:5px solid #0d47a1;
    border-radius:8px;

}

.response-box.show{

    display:block;

}

table{

    width:100%;
    margin-top:15px;
    border-collapse:collapse;

}

th{

    background:#0d47a1;
    color:white;
    padding:12px;

}

td{

    border:1px solid #ddd;
    padding:10px;
    text-align:center;

}

</style>

<!-- ================= ADD SUBJECT ================= -->

<div class="panel" id="panel-add">

<h2>Add Subject</h2>

<div class="form-group">
<label>Subject Name</label>
<input type="text" id="add-name" placeholder="Enter Subject Name">
</div>

<div class="form-group">
<label>Description</label>
<textarea id="add-description" rows="4"
placeholder="Enter Description"></textarea>
</div>

<button class="submit-btn"
onclick="addSubject()">
Create Subject
</button>

<div class="response-box" id="res-add"></div>

</div>

<!-- ================= GET ALL SUBJECTS ================= -->

<div class="panel" id="panel-getall">

<h2>All Subjects</h2>

<button class="submit-btn"
onclick="getAllSubjects()">
Fetch All Subjects
</button>

<div class="response-box" id="res-getall"></div>

</div>

<!-- ================= GET SUBJECT ================= -->

<div class="panel" id="panel-get">

<h2>Get Subject By ID</h2>

<div class="form-group">
<label>Subject ID</label>
<input type="number" id="get-id"
placeholder="Enter Subject ID">
</div>

<button class="submit-btn"
onclick="getSubject()">
Get Subject
</button>

<div class="response-box" id="res-get"></div>

</div>

<!-- ================= UPDATE SUBJECT ================= -->

<div class="panel" id="panel-update">

<h2>Update Subject</h2>

<div class="form-group">
<label>Subject ID</label>
<input type="number" id="upd-id"
placeholder="Enter Subject ID">
</div>

<div class="form-group">
<label>Subject Name</label>
<input type="text" id="upd-name"
placeholder="Enter Subject Name">
</div>

<div class="form-group">
<label>Description</label>
<textarea id="upd-description"
rows="4"
placeholder="Enter Description"></textarea>
</div>

<button class="submit-btn"
onclick="updateSubject()">
Update Subject
</button>

<div class="response-box" id="res-update"></div>

</div>

<!-- ================= PATCH SUBJECT ================= -->

<div class="panel" id="panel-patch">

<h2>Patch Subject</h2>

<div class="form-group">
<label>Subject ID</label>
<input type="number" id="patch-id"
placeholder="Enter Subject ID">
</div>

<div class="form-group">
<label>Subject Name</label>
<input type="text" id="patch-name"
placeholder="Leave empty if not changing">
</div>

<div class="form-group">
<label>Description</label>
<textarea id="patch-description"
rows="4"
placeholder="Leave empty if not changing"></textarea>
</div>

<button class="submit-btn"
onclick="patchSubject()">
Patch Subject
</button>

<div class="response-box" id="res-patch"></div>

</div>

<!-- ================= DELETE SUBJECT ================= -->

<div class="panel" id="panel-delete">

<h2>Delete Subject</h2>

<div class="form-group">
<label>Subject ID</label>
<input type="number" id="delete-id"
placeholder="Enter Subject ID">
</div>

<button class="submit-btn delete-btn"
onclick="deleteSubject()">
🗑️ Delete Subject
</button>

<div class="response-box" id="res-delete"></div>

</div>

<script>

const API = "https://loombackend-1.onrender.com/api/subjects";

const token = localStorage.getItem("token");

/* ===== Welcome Email ===== */

const email = localStorage.getItem("email");

if(email){

    document.getElementById("welcomeText").innerHTML =
    "Welcome, <b>"+email+"</b>";

}
else{

    document.getElementById("welcomeText").innerHTML =
    "Welcome";

}

/* ===== Authentication ===== */

if(token==null){

    window.location.href="login.html";

}

/* ===== Logout ===== */

function logout(){

    localStorage.removeItem("token");
    localStorage.removeItem("role");
    localStorage.removeItem("email");

    window.location.href="login.html";

}

/* ===== Show Selected Panel ===== */

function showPanel(id){

    document.querySelectorAll(".panel").forEach(function(panel){

        panel.classList.remove("active");

    });

    document.getElementById(id).classList.add("active");

}

/* ===== Authorization Header ===== */

function authHeaders(extra={}){

    return Object.assign({

        "Authorization":"Bearer "+token

    },extra);

}

/* ===== Response Box ===== */

function showResponse(id,message,error=false){

    const box=document.getElementById(id);

    box.className="response-box show";

    box.style.borderLeft =
    error ? "5px solid red" : "5px solid #0d47a1";

    box.innerHTML = message;

}

/* ===== Subject Card ===== */

function subjectCard(subject){

return `

<strong>ID :</strong> ${subject.id}<br><br>

<strong>📚 Name :</strong> ${subject.name}<br>

<strong>📝 Description :</strong> ${subject.description}

`;

}

/* ===== Build Table ===== */

function buildTable(subjects){

    if(subjects.length==0){

        return "<h3>No Subjects Available</h3>";

    }

    let rows="";

    subjects.forEach(function(s){

        rows += `

<tr>

<td>${s.id}</td>

<td>${s.name}</td>

<td>${s.description}</td>

</tr>

`;

    });

    return `

<table>

<tr>

<th>ID</th>

<th>Subject Name</th>

<th>Description</th>

</tr>

${rows}

</table>

`;

}

/* ===== Check Status ===== */

function checkStatus(response){

    if(response.status==401){

        alert("Session Expired. Please Login Again.");

        localStorage.removeItem("token");
        localStorage.removeItem("role");
        localStorage.removeItem("email");

        window.location.href="login.html";

        return false;

    }

    if(response.status==403){

        throw new Error("Access Denied.");

    }

    return true;

}


/* ================= ADD SUBJECT ================= */

async function addSubject(){

    const subject={

        name:document.getElementById("add-name").value,

        description:document.getElementById("add-description").value

    };

    try{

        const response=await fetch(API+"/create",{

            method:"POST",

            headers:authHeaders({

                "Content-Type":"application/json"

            }),

            body:JSON.stringify(subject)

        });

        if(!checkStatus(response)) return;

        if(!response.ok)
            throw new Error("Unable to create subject.");

        const data=await response.json();

        showResponse(
            "res-add",
            "Subject created successfully.<br><br>"+subjectCard(data)
        );

    }

    catch(error){

        showResponse("res-add",error.message,true);

    }

}

/* ================= GET ALL SUBJECTS ================= */

async function getAllSubjects(){

    try{

        const response=await fetch(API+"/all",{

            headers:authHeaders()

        });

        if(!checkStatus(response)) return;

        if(!response.ok)
            throw new Error("Unable to fetch subjects.");

        const data=await response.json();

        showResponse(
            "res-getall",
            buildTable(data)
        );

    }

    catch(error){

        showResponse("res-getall",error.message,true);

    }

}

/* ================= GET SUBJECT ================= */

async function getSubject(){

    const id=document.getElementById("get-id").value;

    if(id==""){

        showResponse(
            "res-get",
            "Please enter Subject ID.",
            true
        );

        return;

    }

    try{

        const response=await fetch(API+"/get/"+id,{

            headers:authHeaders()

        });

        if(!checkStatus(response)) return;

        if(!response.ok)
            throw new Error("Subject not found.");

        const data=await response.json();

        showResponse(
            "res-get",
            subjectCard(data)
        );

    }

    catch(error){

        showResponse("res-get",error.message,true);

    }

}
/* ================= UPDATE SUBJECT ================= */

async function updateSubject(){

    const id=document.getElementById("upd-id").value;

    if(id==""){

        showResponse("res-update","Please enter Subject ID.",true);

        return;

    }

    const subject={

        name:document.getElementById("upd-name").value,

        description:document.getElementById("upd-description").value

    };

    try{

        const response=await fetch(API+"/update/"+id,{

            method:"PUT",

            headers:authHeaders({

                "Content-Type":"application/json"

            }),

            body:JSON.stringify(subject)

        });

        if(!checkStatus(response)) return;

        if(!response.ok)
            throw new Error("Unable to update subject.");

        const data=await response.json();

        showResponse(
            "res-update",
            "Subject updated successfully.<br><br>"+subjectCard(data)
        );

    }

    catch(error){

        showResponse("res-update",error.message,true);

    }

}

/* ================= PATCH SUBJECT ================= */

async function patchSubject(){

    const id=document.getElementById("patch-id").value;

    if(id==""){

        showResponse("res-patch","Please enter Subject ID.",true);

        return;

    }

    const subject={};

    const name=document.getElementById("patch-name").value.trim();
    const description=document.getElementById("patch-description").value.trim();

    if(name!=="")
        subject.name=name;

    if(description!=="")
        subject.description=description;

    try{

        const response=await fetch(API+"/patch/"+id,{

            method:"PATCH",

            headers:authHeaders({

                "Content-Type":"application/json"

            }),

            body:JSON.stringify(subject)

        });

        if(!checkStatus(response)) return;

        if(!response.ok)
            throw new Error("Unable to patch subject.");

        const data=await response.json();

        showResponse(
            "res-patch",
            "Subject patched successfully.<br><br>"+subjectCard(data)
        );

    }

    catch(error){

        showResponse("res-patch",error.message,true);

    }

}

/* ================= DELETE SUBJECT ================= */

async function deleteSubject(){

    const id=document.getElementById("delete-id").value;

    if(id==""){

        showResponse("res-delete","Please enter Subject ID.",true);

        return;

    }

    if(!confirm("Are you sure you want to delete this subject?"))
        return;

    try{

        const response=await fetch(API+"/delete/"+id,{

            method:"DELETE",

            headers:authHeaders()

        });

        if(!checkStatus(response)) return;

        if(!response.ok)
            throw new Error("Unable to delete subject.");

        const data=await response.json();

        showResponse(
            "res-delete",
            "Subject deleted successfully.<br><br>"+subjectCard(data)
        );

        document.getElementById("delete-id").value="";

    }

    catch(error){

        showResponse("res-delete",error.message,true);

    }

}

</script>

</body>
</html>
